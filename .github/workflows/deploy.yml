name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mysteryland-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Astro to mysteryland.biz
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://mysteryland.biz
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify and build
        run: npm run verify
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/mysteryland_deploy
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/mysteryland_deploy ~/.ssh/known_hosts
      - name: Deploy release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY_PATH: /home/runner/.ssh/mysteryland_deploy
          DEPLOY_TARGET_PATH: /var/www/vhosts/fanieng.com/mysteryland.biz/httpdocs
          DEPLOY_RELEASE_ROOT: /var/www/vhosts/fanieng.com/mysteryland.biz/releases
          DEPLOY_PRESERVE_ENTRIES: .well-known
          DEPLOY_KEEP_RELEASES: '8'
        run: npm run deploy:ssh
